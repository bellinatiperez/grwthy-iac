apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: grwthy-prod

resources:
  - namespace.yaml
  - configmaps.yaml
  # secrets.yaml removed — secrets are managed manually via kubectl apply -f secrets.real.yaml
  - middleware.yaml
  - ../../base/ingress
  - ../../base/web
  - ../../base/api
  - ../../base/redis
  - ../../base/whatsapp-db
  - ../../base/whatsapp
  - ../../base/minio
  - minio-ingress.yaml

patches:
  - path: ingress-patch.yaml
  - path: web-patch.yaml
  - path: api-patch.yaml
  - path: whatsapp-patch.yaml

images:
  - name: ghcr.io/bellinatiperez/grwthy-web
    newTag: "1.9.0"
  - name: ghcr.io/bellinatiperez/grwthy-api
    newTag: "1.1.4"
  - name: ghcr.io/bellinatiperez/grwthy-whatsapp
    newTag: "1.4.2"
